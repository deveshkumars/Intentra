# Build and push progress server image to GHCR (deployment signal for evaluators).
name: Intentra Docker

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/server/**'
      - 'mobile-app/shared/**'
      - '.github/workflows/intentra-docker.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run test:progress-server

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: img
        shell: bash
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/intentra-progress" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: mobile-app/server/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.IMAGE }}:latest
            ${{ steps.img.outputs.IMAGE }}:${{ github.sha }}
