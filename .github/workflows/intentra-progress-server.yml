# Smoke-test the Bun progress server (SSE + Intentra routes) + mobile handoff-parse unit tests.
name: Intentra progress server

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/server/**'
      - 'mobile-app/app/**'
      - 'mobile-app/shared/**'
      - 'mobile-app/fixtures/**'
      - 'docs/openapi/**'
      - 'scripts/check-intentra-contracts.ts'
      - 'package.json'
      - '.github/workflows/intentra-progress-server.yml'
  pull_request:
    paths:
      - 'mobile-app/server/**'
      - 'mobile-app/app/**'
      - 'mobile-app/shared/**'
      - 'mobile-app/fixtures/**'
      - 'docs/openapi/**'
      - 'scripts/check-intentra-contracts.ts'
      - 'package.json'
      - '.github/workflows/intentra-progress-server.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Bun progress server + guard + fixtures
        run: bun run test:progress-server
